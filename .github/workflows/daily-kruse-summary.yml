name: Daily Kruse Summary

on:
  schedule:
    # Daily report send/build targeting 04:00 Asia/Jerusalem.
    # GitHub cron is UTC-only and best-effort, so use frequent attempts around
    # the local 04:00 target. The wait step handles Israel winter/DST and the
    # early last-sent guard prevents duplicate mail or repeated API spend.
    - cron: '10,20,30,40,50 0 * * *'
    - cron: '0,10,20,30,40,50 1 * * *'
    - cron: '0,10,20 2 * * *'
  repository_dispatch:
    types: [daily-kruse-summary, daily-kruse-summary-test]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'force'
        type: choice
        options:
          - normal
          - force
          - build-only
          - send-existing
      date:
        description: 'Report date (YYYY-MM-DD). Empty -> current report-timezone day.'
        required: false
        default: ''
      test_recipients:
        description: 'Optional comma/space separated test-recipient gate. When set, email sends only to these addresses.'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: daily-kruse-summary
  cancel-in-progress: false

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        shell: bash
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_REF}"
          git checkout --force FETCH_HEAD

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Pick target date
        id: target
        env:
          REPORT_TIME_ZONE: ${{ vars.REPORT_TIME_ZONE || 'Asia/Jerusalem' }}
        run: |
          set -euo pipefail
          INPUT_DATE="${{ github.event.inputs.date || github.event.client_payload.date }}"
          if [ -n "$INPUT_DATE" ]; then
            TARGET="$INPUT_DATE"
          else
            # Scheduled/manual default -> current day in the report timezone.
            TARGET=$(TZ="$REPORT_TIME_ZONE" date +%Y-%m-%d)
          fi
          echo "date=$TARGET" >> $GITHUB_OUTPUT
          echo "Target date: $TARGET ($REPORT_TIME_ZONE)"

      - name: Pick run mode
        id: run_mode
        env:
          INPUT_MODE: ${{ github.event.inputs.mode || github.event.client_payload.mode }}
          TEST_RECIPIENTS: ${{ github.event.inputs.test_recipients || github.event.client_payload.test_recipients || github.event.client_payload.test_recipient }}
          EVENT_ACTION: ${{ github.event.action }}
        run: |
          set -euo pipefail
          MODE="$INPUT_MODE"
          if [ -z "$MODE" ]; then
            if [ "$EVENT_ACTION" = "daily-kruse-summary-test" ]; then
              MODE="send-existing"
            else
              MODE="normal"
            fi
          fi
          if [ "$EVENT_ACTION" = "daily-kruse-summary-test" ] && [ -z "$TEST_RECIPIENTS" ]; then
            echo "::error::daily-kruse-summary-test requires test_recipients or test_recipient in the dispatch payload."
            exit 1
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          {
            echo "test_recipients<<EOF"
            echo "$TEST_RECIPIENTS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Run mode: $MODE"
          if [ -n "$TEST_RECIPIENTS" ]; then
            echo "Test-recipient gate requested."
          fi

      - name: Wait until 04:00 Israel time
        if: github.event_name == 'schedule'
        env:
          REPORT_TIME_ZONE: ${{ vars.REPORT_TIME_ZONE || 'Asia/Jerusalem' }}
          REPORT_SEND_LOCAL_TIME: '04:00'
        run: |
          set -euo pipefail
          now_epoch="$(date +%s)"
          local_day="$(TZ="$REPORT_TIME_ZONE" date +%F)"
          target_epoch="$(TZ="$REPORT_TIME_ZONE" date -d "${local_day} ${REPORT_SEND_LOCAL_TIME}:00" +%s)"
          now_local="$(TZ="$REPORT_TIME_ZONE" date '+%Y-%m-%d %H:%M:%S %Z')"
          if [ "$now_epoch" -lt "$target_epoch" ]; then
            sleep_seconds=$((target_epoch - now_epoch))
            if [ "$sleep_seconds" -gt 7200 ]; then
              echo "::error::Refusing to wait ${sleep_seconds}s for ${REPORT_SEND_LOCAL_TIME} ${REPORT_TIME_ZONE}; schedule drift is too large."
              exit 1
            fi
            echo "Current local time: ${now_local}. Waiting ${sleep_seconds}s for ${REPORT_SEND_LOCAL_TIME} ${REPORT_TIME_ZONE}."
            sleep "$sleep_seconds"
          else
            echo "Current local time: ${now_local}. At or past ${REPORT_SEND_LOCAL_TIME} ${REPORT_TIME_ZONE}; continuing."
          fi

      - name: Skip if this report was already sent
        id: sent_guard
        env:
          MODE: ${{ steps.run_mode.outputs.mode }}
          TARGET: ${{ steps.target.outputs.date }}
        run: |
          set -euo pipefail
          if [ "$MODE" = "force" ] || [ "$MODE" = "build-only" ] || [ "$MODE" = "send-existing" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Mode $MODE bypasses the early last-sent guard."
            exit 0
          fi
          SENT_DATE="$(node -e "const fs=require('fs'); const p='kruse-summary/last-sent.json'; if (!fs.existsSync(p)) process.exit(0); const s=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(String(s.last_sent_for_date||''));")"
          if [ "$SENT_DATE" = "$TARGET" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Report for $TARGET was already sent; skipping duplicate scheduled attempt."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Report for $TARGET has not been sent yet."
          fi

      - name: Test X scraper
        if: steps.sent_guard.outputs.skip != 'true'
        working-directory: twitter_to_md
        run: |
          set -euo pipefail
          echo "::group::twitter_to_md npm install"
          npm install
          echo "::endgroup::"
          echo "::group::twitter_to_md unit tests"
          npm test
          echo "::endgroup::"

      - name: Test summary + website
        if: steps.sent_guard.outputs.skip != 'true'
        working-directory: kruse-summary
        run: |
          set -euo pipefail
          echo "::group::kruse-summary npm install"
          npm install
          npx playwright install --with-deps chromium
          echo "::endgroup::"
          echo "::group::kruse-summary unit + website tests"
          npm test
          echo "::endgroup::"

      - name: Scrape X tweets
        if: steps.sent_guard.outputs.skip != 'true'
        working-directory: twitter_to_md
        env:
          XAPI_BEARER_TOKEN: ${{ secrets.XAPI_BEARER_TOKEN }}
        run: |
          set -euo pipefail
          TARGET="${{ steps.target.outputs.date }}"
          MODE="${{ steps.run_mode.outputs.mode }}"
          if [ "$MODE" = "send-existing" ]; then
            echo "send-existing mode: reusing committed report data; skipping X scrape."
            exit 0
          fi
          if [ "$MODE" != "force" ] && [ -f "data/${TARGET}.json" ] && \
             [ "$(node -e "const p=JSON.parse(require('fs').readFileSync('data/${TARGET}.json','utf8')); const t=Date.parse(p.window_end_utc||p.fetched_at||0); console.log((p.tweet_count||0)>0 && Number.isFinite(t) && Date.now()-t < 4*60*60*1000 ? 'fresh' : 'stale')")" = "fresh" ]; then
            echo "Already have fresh rolling tweets for $TARGET - skipping X API call."
            exit 0
          fi
          echo "::group::Fetch X tweets for $TARGET"
          npm install
          node main.js --date=$TARGET --window=24
          echo "::endgroup::"

      - name: Scrape forum
        if: steps.sent_guard.outputs.skip != 'true'
        working-directory: forum_to_md
        env:
          FORUM_USERNAME: ${{ secrets.FORUM_USERNAME }}
          FORUM_PASSWORD: ${{ secrets.FORUM_PASSWORD }}
        run: |
          set -euo pipefail
          TARGET="${{ steps.target.outputs.date }}"
          MODE="${{ steps.run_mode.outputs.mode }}"
          if [ "$MODE" = "send-existing" ]; then
            echo "send-existing mode: reusing committed forum data; skipping forum scrape."
            exit 0
          fi
          echo "::group::Fetch forum posts for $TARGET"
          npm install
          if [ "$MODE" = "force" ]; then
            node main-daily.js --date=$TARGET --force
          else
            node main-daily.js --date=$TARGET
          fi
          echo "::endgroup::"

      - name: Build report + send email
        if: steps.sent_guard.outputs.skip != 'true'
        working-directory: kruse-summary
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_BASE64 }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_FORM_RESPONSES_CSV_URL: ${{ secrets.GOOGLE_FORM_RESPONSES_CSV_URL }}
          GOOGLE_SHEET_RANGE: ${{ vars.GOOGLE_SHEET_RANGE }}
          SUPABASE_URL: https://zpxhovwsswnjdjibcvsh.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_MAILING_LIST_TABLE: kruse_mailing_list
          KRUSE_SITE_PUBLIC_BASE_URL: https://guyhouri.github.io/kruse-ai-scrape
          REPORT_TIME_ZONE: ${{ vars.REPORT_TIME_ZONE || 'Asia/Jerusalem' }}
          INCLUDE_FORUM: 'true'
          KRUSE_EMAIL_TEST_RECIPIENTS: ${{ steps.run_mode.outputs.test_recipients }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY is missing. Add it as a GitHub Actions secret so the workflow can fetch private Supabase signups."
            exit 1
          fi
          echo "::group::Install kruse-summary dependencies"
          npm install
          echo "::endgroup::"
          echo "::group::Fetch mailing list from Supabase"
          npm run sync-mailing-list
          echo "::endgroup::"
          MODE="${{ steps.run_mode.outputs.mode }}"
          DATE="${{ steps.target.outputs.date }}"
          DATE_FLAG=""
          if [ -n "$DATE" ]; then DATE_FLAG="--date=$DATE"; fi
          if [ "$MODE" != "send-existing" ]; then
            echo "::group::Build combined daily input"
            node code/build-input.js $DATE
            echo "::endgroup::"
          else
            echo "send-existing mode: using committed curated/${DATE}.json and out/${DATE}.html source data."
          fi
          echo "::group::Summarize with Anthropic and send email"
          case "$MODE" in
            build-only)
              node main.js --build-only --use-ai $DATE_FLAG
              npm run verify-report -- --date=$DATE
              ;;
            force)
              node main.js --build-only --use-ai $DATE_FLAG
              npm run verify-report -- --date=$DATE
              node main.js --force $DATE_FLAG
              npm run verify-report -- --date=$DATE
              ;;
            send-existing)
              node main.js --build-only $DATE_FLAG
              npm run verify-report -- --date=$DATE
              node main.js --force $DATE_FLAG
              npm run verify-report -- --date=$DATE
              ;;
            *)
              node main.js --build-only --use-ai $DATE_FLAG
              npm run verify-report -- --date=$DATE
              node main.js $DATE_FLAG
              npm run verify-report -- --date=$DATE
              ;;
          esac
          echo "::endgroup::"

      - name: Build public report site
        if: steps.sent_guard.outputs.skip != 'true'
        working-directory: kruse-summary
        env:
          KRUSE_SITE_PUBLIC_BASE_URL: https://guyhouri.github.io/kruse-ai-scrape
          KRUSE_GOOGLE_FORM_PUBLIC_URL: ${{ vars.KRUSE_GOOGLE_FORM_PUBLIC_URL }}
          KRUSE_GOOGLE_FORM_ACTION: ${{ vars.KRUSE_GOOGLE_FORM_ACTION }}
          KRUSE_GOOGLE_FORM_ENTRY_TYPE: ${{ vars.KRUSE_GOOGLE_FORM_ENTRY_TYPE }}
          KRUSE_GOOGLE_FORM_ENTRY_NAME: ${{ vars.KRUSE_GOOGLE_FORM_ENTRY_NAME }}
          KRUSE_GOOGLE_FORM_ENTRY_EMAIL: ${{ vars.KRUSE_GOOGLE_FORM_ENTRY_EMAIL }}
          KRUSE_GOOGLE_FORM_ENTRY_FREQUENCY: ${{ vars.KRUSE_GOOGLE_FORM_ENTRY_FREQUENCY }}
          KRUSE_GOOGLE_FORM_ENTRY_REPORT_DATE: ${{ vars.KRUSE_GOOGLE_FORM_ENTRY_REPORT_DATE }}
          KRUSE_GOOGLE_FORM_ENTRY_REPORT_URL: ${{ vars.KRUSE_GOOGLE_FORM_ENTRY_REPORT_URL }}
          KRUSE_GOOGLE_FORM_ENTRY_RATING: ${{ vars.KRUSE_GOOGLE_FORM_ENTRY_RATING }}
          KRUSE_GOOGLE_FORM_ENTRY_FEEDBACK: ${{ vars.KRUSE_GOOGLE_FORM_ENTRY_FEEDBACK }}
          NEXT_PUBLIC_SUPABASE_URL: https://zpxhovwsswnjdjibcvsh.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_afhmZKXzerLWNYENUqsaFg_XfVWjODD
          SUPABASE_MAILING_LIST_TABLE: kruse_mailing_list
          SUPABASE_FEEDBACK_TABLE: kruse_report_feedback
        run: |
          set -euo pipefail
          echo "::group::Build static report site"
          npm run build-site
          npm run verify-report -- --date=${{ steps.target.outputs.date }} --dir=site/reports
          echo "::endgroup::"

      - name: Mirror public report site into docs
        if: steps.sent_guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          rm -rf docs/reports docs/latest docs/unsubscribe
          cp kruse-summary/site/index.html docs/index.html
          cp kruse-summary/site/thanks.html docs/thanks.html
          cp kruse-summary/site/_headers docs/_headers
          cp kruse-summary/site/_redirects docs/_redirects
          cp kruse-summary/site/.nojekyll docs/.nojekyll
          cp -R kruse-summary/site/reports docs/reports
          cp -R kruse-summary/site/latest docs/latest
          cp -R kruse-summary/site/unsubscribe docs/unsubscribe

      - name: Commit data + state back to repo
        if: steps.sent_guard.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "kruse-bot"
          git config user.email "bot@users.noreply.github.com"
          git add twitter_to_md/data forum_to_md/daily kruse-summary/mailing_list.json kruse-summary/last-sent.json kruse-summary/curated kruse-summary/out docs 2>/dev/null || true
          git diff --cached --quiet || git commit -m "daily: ${{ steps.target.outputs.date }}"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:main || true

      - name: Trigger CI/CD site deploy
        if: steps.sent_guard.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl -sS -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/dispatches" \
            -d '{"event_type":"deploy-report-site","client_payload":{"source":"daily-kruse-summary","date":"${{ steps.target.outputs.date }}"}}'
