name: Daily Kruse Summary

on:
  schedule:
    # Pre-sunrise window for Jerusalem year-round (~02:00-04:30 UTC).
    - cron: '0,30 2-4 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'force'
        type: choice
        options:
          - normal
          - force
          - v2-test
          - build-only
      date:
        description: 'Report date (YYYY-MM-DD). Empty → today UTC for manual runs, yesterday UTC for cron.'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: daily-kruse-summary
  cancel-in-progress: false

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Pick target date
        id: target
        run: |
          INPUT_DATE="${{ github.event.inputs.date }}"
          if [ -n "$INPUT_DATE" ]; then
            TARGET="$INPUT_DATE"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual run with no date → today UTC. Users testing want current content.
            TARGET=$(date -u +%Y-%m-%d)
          else
            # Scheduled cron → yesterday UTC (the day that just ended).
            TARGET=$(date -u -d 'yesterday' +%Y-%m-%d)
          fi
          echo "date=$TARGET" >> $GITHUB_OUTPUT
          echo "Target date: $TARGET"

      - name: Scrape X tweets (skip if already cached)
        if: github.event.inputs.mode != 'v2-test'
        working-directory: twitter_to_md
        env:
          XAPI_BEARER_TOKEN: ${{ secrets.XAPI_BEARER_TOKEN }}
        run: |
          TARGET="${{ steps.target.outputs.date }}"
          if [ -f "data/${TARGET}.json" ] && \
             [ "$(node -e "console.log(JSON.parse(require('fs').readFileSync('data/${TARGET}.json','utf8')).tweet_count||0)")" -gt 0 ]; then
            echo "Already have tweets for $TARGET — skipping X API call."
            exit 0
          fi
          npm install
          node main.js --date=$TARGET

      - name: Scrape forum (last 24h)
        if: github.event.inputs.mode != 'v2-test'
        working-directory: forum_to_md
        env:
          FORUM_USERNAME: ${{ secrets.FORUM_USERNAME }}
          FORUM_PASSWORD: ${{ secrets.FORUM_PASSWORD }}
        # main-daily.js self-skips if the day's file is <4h old.
        run: |
          npm install
          node main-daily.js

      - name: Build report + send email
        working-directory: kruse-summary
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          LOCATION_LAT: ${{ vars.LOCATION_LAT }}
          LOCATION_LON: ${{ vars.LOCATION_LON }}
          INCLUDE_FORUM: 'true'
        run: |
          npm install
          MODE="${{ github.event.inputs.mode }}"
          DATE="${{ steps.target.outputs.date }}"
          DATE_FLAG=""
          if [ -n "$DATE" ]; then DATE_FLAG="--date=$DATE"; fi
          case "$MODE" in
            v2-test)    node main.js --send-v2-test ;;
            force)      node main.js --force $DATE_FLAG ;;
            build-only) node main.js --build-only $DATE_FLAG ;;
            *)          node main.js $DATE_FLAG ;;
          esac

      - name: Commit data + state back to repo
        run: |
          git config user.name "kruse-bot"
          git config user.email "bot@users.noreply.github.com"
          git add twitter_to_md/data forum_to_md/daily kruse-summary/last-sent.json kruse-summary/out 2>/dev/null || true
          git diff --cached --quiet || git commit -m "daily: ${{ steps.target.outputs.date }}"
          git push || true
