name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  node-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - twitter_to_md
          - kruse-summary
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install
        working-directory: ${{ matrix.module }}
        run: npm install
      - name: Test
        working-directory: ${{ matrix.module }}
        run: npm test
