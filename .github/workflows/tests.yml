name: Tests

on:
  workflow_dispatch: {}
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  node-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - twitter_to_md
          - kruse-summary
    steps:
      - name: Checkout
        shell: bash
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_REF}"
          git checkout --force FETCH_HEAD

      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install
        working-directory: ${{ matrix.module }}
        run: npm install
      - name: Test
        working-directory: ${{ matrix.module }}
        run: npm test
