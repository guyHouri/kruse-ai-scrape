name: Deploy Kruse Report Site

# Manual/static deploy for the report archive.

on:
  repository_dispatch:
    types: [deploy-kruse-report-site]
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-report-site.yml'
      - 'kruse-summary/code/build-site.js'
      - 'kruse-summary/curated/**'
      - 'kruse-summary/out/**'
      - 'kruse-summary/package-lock.json'
      - 'kruse-summary/package.json'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: kruse-summary/package-lock.json
      - name: Install kruse-summary dependencies
        working-directory: kruse-summary
        run: npm ci
      - name: Build static report site
        working-directory: kruse-summary
        run: npm run build-site
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: kruse-summary/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
