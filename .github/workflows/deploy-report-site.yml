name: Deploy Report Site

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - docs/**
      - .github/workflows/deploy-report-site.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: report-site-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        shell: bash
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_REF}"
          git checkout --force FETCH_HEAD

      - name: Upload report site
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy report site
        id: deployment
        uses: actions/deploy-pages@v5
